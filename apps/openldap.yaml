apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openldap
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  # Multi-source: the chart comes from the upstream Helm repo, while its values
  # live in THIS Git repo (manifests/openldap/values.yaml). The second source is
  # reference-only (ref: values) and exposes the repo as $values to the first.
  sources:
    - repoURL: https://jp-gouin.github.io/helm-openldap/
      chart: openldap
      targetRevision: 2.0.4
      helm:
        releaseName: openldap
        valueFiles:
          - $values/manifests/openldap/values.yaml
    - repoURL: https://github.com/shaqa3/homelab-gitops.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: openldap
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
