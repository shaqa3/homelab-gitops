apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openldap
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  # OpenLDAP is installed straight from the upstream Helm chart repo,
  # with our minikube values inlined here (no chart vendored into Git).
  source:
    repoURL: https://jp-gouin.github.io/helm-openldap/
    chart: openldap
    targetRevision: 2.0.4
    helm:
      releaseName: openldap
      values: |
        replicaCount: 1
        image:
          repository: osixia/openldap
          tag: 1.5.0
          pullPolicy: IfNotPresent
          pullSecret: ""
        replication:
          enabled: false
        tls:
          enabled: false
        env:
          LDAP_ORGANISATION: "Example Inc."
          LDAP_DOMAIN: "example.org"
          LDAP_TLS: "false"
          LDAP_BACKEND: "mdb"
        adminPassword: admin
        configPassword: config
        persistence:
          enabled: true
          size: 1Gi
        ltb-passwd:
          enabled: false
        phpldapadmin:
          enabled: false
        service:
          type: ClusterIP
          ldapPort: 389
          sslLdapPort: 636
  destination:
    server: https://kubernetes.default.svc
    namespace: openldap
  # The chart renders an empty-named imagePullSecrets entry (from pullSecret: ""),
  # which breaks ArgoCD's three-way-merge diff with
  # "does not contain declared merge key: name". We don't need to manage that
  # field (anonymous pull of the public osixia image), so ignore it in diffs.
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/template/spec/imagePullSecrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # Apply server-side: avoids the client-side three-way-merge patch that
      # fails on the chart's null-named imagePullSecrets entry during sync.
      - ServerSideApply=true
