apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak-cr
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"   # after keycloak-operator (wave -1)
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/shaqa3/homelab-gitops.git
    targetRevision: HEAD
    path: manifests/keycloak-cr
  destination:
    server: https://kubernetes.default.svc
    namespace: keycloak
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # realm import JSON is large; avoid client-side patch limits
