apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: kc
  namespace: keycloak
spec:
  instances: 1
  db:
    vendor: postgres
    host: postgres-kc
    port: 5432
    database: keycloak
    usernameSecret:
      name: keycloak-db
      key: username
    passwordSecret:
      name: keycloak-db
      key: password
  hostname:
    # External URL (TLS is terminated at the nginx ingress).
    hostname: https://keycloak.192.168.64.3.nip.io
    strict: false
  http:
    httpEnabled: true        # serve plain HTTP to the cluster; ingress does TLS
  proxy:
    headers: xforwarded      # trust X-Forwarded-* from the ingress
  ingress:
    enabled: false           # we manage our own nginx ingress
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      memory: "1500Mi"
