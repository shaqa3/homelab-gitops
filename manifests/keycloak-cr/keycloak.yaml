apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: kc
  namespace: keycloak
spec:
  instances: 1
  # Pin the server image to 26.6.3 (matches the realm export). 26.3.x had an NPE
  # in the fine-grained-admin-permissions + LDAP group-mapper path that broke
  # admin API calls for federated users in groups. startOptimized:false because
  # the stock image isn't pre-built for our config (operator would pass
  # --optimized otherwise and the first start fails).
  image: quay.io/keycloak/keycloak:26.6.3
  startOptimized: false
  db:
    vendor: postgres
    host: postgres-kc
    port: 5432
    database: keycloak
    usernameSecret:
      name: keycloak-db
      key: username
    passwordSecret:
      name: keycloak-db
      key: password
  hostname:
    # External URL (TLS is terminated at the nginx ingress).
    hostname: https://keycloak.192.168.64.3.nip.io
    strict: false
  http:
    httpEnabled: true        # serve plain HTTP to the cluster; ingress does TLS
  proxy:
    headers: xforwarded      # trust X-Forwarded-* from the ingress
  ingress:
    enabled: false           # we manage our own nginx ingress
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      memory: "1500Mi"
