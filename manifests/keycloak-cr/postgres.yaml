apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-kc-data
  namespace: keycloak
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-kc
  namespace: keycloak
  labels: { app: postgres-kc }
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres-kc }
  template:
    metadata:
      labels: { app: postgres-kc }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DB
              value: keycloak
            - name: POSTGRES_USER
              valueFrom: { secretKeyRef: { name: keycloak-db, key: username } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: keycloak-db, key: password } }
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "keycloak"] }
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-kc-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-kc
  namespace: keycloak
  labels: { app: postgres-kc }
spec:
  selector: { app: postgres-kc }
  ports:
    - port: 5432
      targetPort: 5432
