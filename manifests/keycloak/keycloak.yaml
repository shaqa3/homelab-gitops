# The Keycloak workload is now managed by the Keycloak Operator (see
# manifests/keycloak-cr: the `kc` Keycloak CR + Postgres + realm import).
# This file keeps only the public Ingress, pointed at the operator's service.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keycloak
  namespace: keycloak
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    # Keep HTTP usable (no forced 308) for CLI tooling; the browser app uses HTTPS.
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - keycloak.192.168.64.3.nip.io
      secretName: homelab-tls   # mkcert cert, created out-of-band (not in Git)
  rules:
    - host: keycloak.192.168.64.3.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kc-service     # operator-managed Keycloak service
                port:
                  number: 8080
