apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: react-app
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - react.192.168.64.3.nip.io
      secretName: homelab-tls   # mkcert cert, created out-of-band (not in Git)
  rules:
    - host: react.192.168.64.3.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: react-app
                port:
                  number: 80
