<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Keycloak + React demo</title>
  <style>
    :root { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center;
           background: #0f172a; color: #e2e8f0; }
    .card { background: #1e293b; padding: 2rem 2.5rem; border-radius: 14px;
            box-shadow: 0 10px 40px rgba(0,0,0,.4); width: min(640px, 94vw); }
    h1 { margin: 0 0 .25rem; font-size: 1.4rem; }
    .muted { color: #94a3b8; font-size: .9rem; margin-top: 0; }
    button { font-size: 1rem; padding: .6rem 1.1rem; border: 0; border-radius: 8px;
             cursor: pointer; font-weight: 600; }
    .primary { background: #38bdf8; color: #042f3f; }
    .ghost { background: transparent; color: #94a3b8; border: 1px solid #334155; }
    .row { display: flex; gap: .6rem; margin-top: 1.25rem; flex-wrap: wrap; }
    .kv { display: grid; grid-template-columns: auto 1fr; gap: .35rem .75rem;
          margin-top: 1rem; font-size: .92rem; }
    .kv b { color: #93c5fd; }
    pre { background: #0b1220; padding: .75rem; border-radius: 8px; overflow: auto;
          font-size: .75rem; max-height: 220px; }
    .pill { display: inline-block; background: #064e3b; color: #6ee7b7;
            padding: .15rem .6rem; border-radius: 999px; font-size: .75rem; }
    nav { display: flex; gap: .4rem; border-bottom: 1px solid #334155;
          margin-bottom: 1.1rem; }
    nav button { background: none; border: 0; color: #94a3b8; padding: .5rem .9rem;
                 border-bottom: 2px solid transparent; border-radius: 0; }
    nav button.active { color: #e2e8f0; border-bottom-color: #38bdf8; }
    table { width: 100%; border-collapse: collapse; margin-top: .5rem; font-size: .88rem; }
    th, td { text-align: left; padding: .5rem .6rem; border-bottom: 1px solid #283548; }
    th { color: #93c5fd; font-weight: 600; }
    tr:hover td { background: #182231; }
    .tag { font-size: .72rem; padding: .1rem .45rem; border-radius: 999px; }
    .tag.fed { background: #1e3a5f; color: #7dd3fc; }
    .tag.local { background: #3f2d1e; color: #fcd34d; }
    .err { background: #3b1d1d; color: #fca5a5; padding: .75rem 1rem;
           border-radius: 8px; margin-top: 1rem; font-size: .88rem; }
  </style>

  <!-- React (UMD globals) + Babel for in-browser JSX -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- keycloak-js is ESM-only now: load it and expose as a global for the app -->
  <script type="module">
    import Keycloak from 'https://esm.sh/keycloak-js@26';
    window.Keycloak = Keycloak;
    window.dispatchEvent(new Event('keycloak-loaded'));
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect } = React;

    const KC_CONFIG = {
      url: 'http://keycloak.192.168.64.3.nip.io',
      realm: 'demo',
      clientId: 'react-app',
    };

    let keycloak; // single instance

    function App() {
      const [status, setStatus] = useState('loading'); // loading | anon | authed | error
      const [profile, setProfile] = useState(null);
      const [tab, setTab] = useState('profile');

      useEffect(() => {
        const start = async () => {
          if (!window.Keycloak) {
            await new Promise((r) => window.addEventListener('keycloak-loaded', r, { once: true }));
          }
          try {
            keycloak = new window.Keycloak(KC_CONFIG);
            const authed = await keycloak.init({ pkceMethod: 'S256', checkLoginIframe: false });
            if (authed) { setProfile(keycloak.tokenParsed); setStatus('authed'); }
            else setStatus('anon');
          } catch (e) { console.error(e); setStatus('error'); }
        };
        start();
      }, []);

      if (status === 'loading') return <Card><p className="muted">Connecting to Keycloak…</p></Card>;
      if (status === 'error')   return <Card><h1>Something went wrong</h1>
        <p className="muted">Check the console. Is Keycloak reachable and the redirect URI allowed?</p></Card>;
      if (status === 'anon') return (
        <Card>
          <h1>Keycloak + React</h1>
          <p className="muted">You are not signed in.</p>
          <div className="row"><button className="primary" onClick={() => keycloak.login()}>Log in with Keycloak</button></div>
        </Card>
      );

      return (
        <Card>
          <nav>
            <button className={tab === 'profile' ? 'active' : ''} onClick={() => setTab('profile')}>Profile</button>
            <button className={tab === 'users' ? 'active' : ''} onClick={() => setTab('users')}>Users</button>
            <span style={{ marginLeft: 'auto' }} />
            <button className="ghost" onClick={() => keycloak.logout()}>Log out</button>
          </nav>
          {tab === 'profile' ? <Profile profile={profile} /> : <Users />}
        </Card>
      );
    }

    function Profile({ profile }) {
      const [showToken, setShowToken] = useState(false);
      return (
        <div>
          <h1>Welcome, {profile.name || profile.preferred_username} <span className="pill">signed in</span></h1>
          <p className="muted">Authenticated via Keycloak (realm <code>demo</code>).</p>
          <div className="kv">
            <b>Username</b><span>{profile.preferred_username}</span>
            <b>Name</b><span>{profile.name || '—'}</span>
            <b>Email</b><span>{profile.email || '—'}</span>
            <b>Subject</b><span>{profile.sub}</span>
          </div>
          <div className="row">
            <button className="ghost" onClick={() => setShowToken((s) => !s)}>
              {showToken ? 'Hide' : 'Show'} ID token claims
            </button>
          </div>
          {showToken && <pre>{JSON.stringify(profile, null, 2)}</pre>}
        </div>
      );
    }

    const ADMIN = `${KC_CONFIG.url}/admin/realms/${KC_CONFIG.realm}`;
    async function adminFetch(path, opts = {}) {
      await keycloak.updateToken(30).catch(() => {});
      return fetch(`${ADMIN}${path}`, {
        ...opts,
        headers: { Authorization: `Bearer ${keycloak.token}`, ...(opts.headers || {}) },
      });
    }

    function Users() {
      const [state, setState] = useState({ loading: true, users: null, error: null });
      const [showForm, setShowForm] = useState(false);

      const load = async () => {
        setState({ loading: true, users: null, error: null });
        try {
          const res = await adminFetch('/users?briefRepresentation=true&max=100');
          if (res.status === 403) {
            setState({ loading: false, users: null,
              error: "You don't have the 'view-users' permission in this realm." });
            return;
          }
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const users = await res.json();
          users.sort((a, b) => (a.username || '').localeCompare(b.username || ''));
          setState({ loading: false, users, error: null });
        } catch (e) {
          setState({ loading: false, users: null, error: e.message });
        }
      };

      useEffect(() => { load(); }, []);

      return (
        <div>
          <h1>Users <span className="muted" style={{ fontSize: '.9rem', fontWeight: 400 }}>
            in realm <code>demo</code></span></h1>
          <p className="muted">Fetched live from the Keycloak Admin API with your access token.</p>
          {state.loading && <p className="muted">Loading…</p>}
          {state.error && <div className="err">{state.error}</div>}
          {state.users && (
            <table>
              <thead><tr><th>Username</th><th>Name</th><th>Email</th><th>Source</th><th>Status</th></tr></thead>
              <tbody>
                {state.users.map((u) => (
                  <tr key={u.id}>
                    <td>{u.username}</td>
                    <td>{[u.firstName, u.lastName].filter(Boolean).join(' ') || '—'}</td>
                    <td>{u.email || '—'}</td>
                    <td><span className={'tag ' + (u.federationLink ? 'fed' : 'local')}>
                      {u.federationLink ? 'LDAP' : 'local'}</span></td>
                    <td>{u.enabled ? 'enabled' : 'disabled'}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
          <div className="row">
            <button className="ghost" onClick={load}>Refresh</button>
            <button className="primary" onClick={() => setShowForm((s) => !s)}>
              {showForm ? 'Cancel' : '+ New user'}
            </button>
          </div>
          {showForm && <CreateUser onDone={() => { setShowForm(false); load(); }} />}
        </div>
      );
    }

    function CreateUser({ onDone }) {
      const empty = { username: '', firstName: '', lastName: '', email: '', password: '' };
      const [form, setForm] = useState(empty);
      const [msg, setMsg] = useState(null);     // { ok, text }
      const [busy, setBusy] = useState(false);
      const set = (k) => (e) => setForm((f) => ({ ...f, [k]: e.target.value }));

      const submit = async (e) => {
        e.preventDefault();
        setBusy(true); setMsg(null);
        try {
          const res = await adminFetch('/users', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              username: form.username,
              firstName: form.firstName || undefined,
              lastName: form.lastName || undefined,
              email: form.email || undefined,
              enabled: true,
              emailVerified: true,
              credentials: form.password
                ? [{ type: 'password', value: form.password, temporary: false }] : undefined,
            }),
          });
          if (res.status === 201) {
            setMsg({ ok: true, text: `Created "${form.username}" (also written to LDAP).` });
            setForm(empty);
            setTimeout(onDone, 900);
          } else if (res.status === 403) {
            setMsg({ ok: false, text: "You don't have the 'manage-users' permission." });
          } else if (res.status === 409) {
            setMsg({ ok: false, text: 'A user with that username or email already exists.' });
          } else {
            const t = await res.text();
            setMsg({ ok: false, text: `HTTP ${res.status}: ${t.slice(0, 160)}` });
          }
        } catch (e) {
          setMsg({ ok: false, text: e.message });
        } finally { setBusy(false); }
      };

      const inp = { padding: '.5rem .6rem', borderRadius: '7px', border: '1px solid #334155',
                    background: '#0b1220', color: '#e2e8f0', fontSize: '.9rem' };
      return (
        <form onSubmit={submit} style={{ marginTop: '1rem', display: 'grid', gap: '.6rem',
              gridTemplateColumns: '1fr 1fr', background: '#162032', padding: '1rem',
              borderRadius: '10px' }}>
          <input style={inp} placeholder="username *" required value={form.username} onChange={set('username')} />
          <input style={inp} placeholder="password *" type="password" required value={form.password} onChange={set('password')} />
          <input style={inp} placeholder="first name" value={form.firstName} onChange={set('firstName')} />
          <input style={inp} placeholder="last name" value={form.lastName} onChange={set('lastName')} />
          <input style={{ ...inp, gridColumn: '1 / -1' }} placeholder="email" type="email" value={form.email} onChange={set('email')} />
          {msg && <div style={{ gridColumn: '1 / -1', fontSize: '.85rem',
            color: msg.ok ? '#6ee7b7' : '#fca5a5' }}>{msg.text}</div>}
          <div style={{ gridColumn: '1 / -1' }}>
            <button className="primary" type="submit" disabled={busy}>
              {busy ? 'Creating…' : 'Create user'}
            </button>
          </div>
        </form>
      );
    }

    function Card({ children }) { return <div className="card">{children}</div>; }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
