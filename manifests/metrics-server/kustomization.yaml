apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - components.yaml

# minikube's kubelet serving certs aren't signed by the cluster CA, so
# metrics-server needs --kubelet-insecure-tls to scrape them.
patches:
  - target:
      kind: Deployment
      name: metrics-server
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: --kubelet-insecure-tls
